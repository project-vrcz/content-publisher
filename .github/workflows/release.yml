name: Release

concurrency:
  group: releasing

on:
  workflow_dispatch:
    inputs:
      pre-release:
        type: boolean
        required: true
        description: Is Pre-release
        default: true
      new-version:
        required: true
        description: Version to Release, e.g 1.0.0
        type: string

env:
  releasing_branch: releasing
  changelog_artifact_name: changelog
  release_note_artifact_name: release-note
  release_note_file_name: release-note
  assets_to_release_artifact_pattern: vrchat-content-publisher-app-*
  release_git_tag: v${{ inputs.new-version }}
  sentry_environment: ${{ case(inputs.pre-release, 'preview', 'stable') }} # due to limitation of github action, build workflow input have same expression too... instead of env

permissions:
  contents: read

jobs:
  update-changelog:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    outputs:
      changelog-artifact-id: ${{ steps.upload-changelog.outputs.artifact-id }}
      release-note-artifact-id: ${{ steps.upload-release-note.outputs.artifact-id }}

    env:
      repo_dir: ${{ github.workspace }}/repo
      path_to_release_note: ${{ github.workspace }}/release-note

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: ${{ env.repo_dir }}
          submodules: recursive

      - name: Setup Git User
        working-directory: ${{ env.repo_dir }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Update Version in .csproj
        uses: vers-one/dotnet-project-version-updater@cba3f00eab99017c431b3817a9d71b3a489cff30
        with:
          tags: csproj.Version
          version: ${{ inputs.new-version}}
          file: "\"${{ env.repo_dir }}/src/App/VRChatContentPublisher.App/VRChatContentPublisher.App.csproj\", \"${{ env.repo_dir }}/src/Core/VRChatContentPublisher.Core/VRChatContentPublisher.Core.csproj\", \"${{ env.repo_dir }}/src/Core/VRChatContentPublisher.Core.Shared/VRChatContentPublisher.Core.Shared.csproj\""

      - name: Extact Release Note and Update Changelog
        working-directory: ${{ env.repo_dir }}
        env:
          NEW_VERSION: ${{ inputs.new-version }}
          RELEASE_NOTE_PATH: ${{ env.path_to_release_note }}
          GITHUB_REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: dotnet run dev/scripts/release-changelog.cs -- CHANGELOG.md $NEW_VERSION $GITHUB_REPO_URL --print-changes-to-stdout ${{ inputs.pre-release && '--keep-unreleased-changes' || '' }} > $RELEASE_NOTE_PATH
        shell: bash

      - name: Upload CHANGELOG.md
        id: upload-changelog
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.changelog_artifact_name }}
          path: ${{ env.repo_dir }}/CHANGELOG.md

      - name: Upload Release Note
        id: upload-release-note
        uses: actions/upload-artifact@v7
        with:
          name: ${{ env.release_note_artifact_name }}
          path: ${{ env.path_to_release_note }}

      - name: Commit and Push
        working-directory: ${{ env.repo_dir }}
        env:
          NEW_VERSION: ${{ inputs.new-version }}
          RELEASING_BRANCH: ${{ env.releasing_branch }}
        shell: bash
        run: |
          # create release commit, push it, and create relreasing branch
          git switch -c $RELEASING_BRANCH
          git commit -am "chore: release $NEW_VERSION [skip ci]"
          git push -f -u origin releasing

  build:
    needs: update-changelog
    uses: ./.github/workflows/build.yml
    with:
      ref: releasing
      sentry-environment: ${{ case(inputs.pre-release, 'preview', 'stable') }}
      use-production-sentry-dsn: true

  create-release:
    needs: [update-changelog, build]
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      repo_dir: ${{ github.workspace }}/repo
      assets_path: ${{ github.workspace }}/assets
      artifact_download_path: ${{ github.workspace }}/artifact-download
      note_path: ${{ github.workspace }}/note

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          path: ${{ env.repo_dir }}
          ref: ${{ env.releasing_branch }}
          fetch-depth: 2

      - name: Setup Git User
        working-directory: ${{ env.repo_dir }}
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Download Release Artifacts
        uses: actions/download-artifact@v8
        with:
          path: ${{ env.artifact_download_path }}
          pattern: '{unpacked-portable-*,installer-*,pdb-*}'

      - name: Create release ZIPs
        env:
          ARTIFACT_PATH: ${{ env.artifact_download_path }}
          OUTPUT_PATH: ${{ env.assets_path }}
        run: |
          set -eux
          mkdir -p $OUTPUT_PATH
          cd $ARTIFACT_PATH

          for f in unpacked-portable-* installer-* pdb-*; do
            [ -d "$f" ] || continue
            (cd "$f" && zip -r "$OUTPUT_PATH/${f}.zip" .)
          done
        shell: bash

      - name: Download Release Note
        uses: actions/download-artifact@v8
        with:
          artifact-ids: ${{ needs.update-changelog.outputs.release-note-artifact-id }}
          path: ${{ env.note_path }}

      - name: Push Tag
        working-directory: ${{ env.repo_dir }}
        env:
          GIT_TAG: ${{ env.release_git_tag }}
          RELEASING_REF: ${{ env.releasing_branch }}
          ACTION_REF: ${{ github.ref_name }}
        shell: bash
        run: |
          git tag $GIT_TAG
          git push --tags
          # create main branch from releasing branch and fetch
          git switch -c $ACTION_REF
          git push -u origin $ACTION_REF

      - name: Make Release
        env:
          RELEASE_VERSION: ${{ inputs.new-version }}
          PATH_TO_NOTES: ${{ env.note_path }}/${{ env.release_note_file_name }}
          PATH_TO_RELEASE_ASSETS: ${{ env.assets_path }}
          GH_TOKEN: ${{ github.token }}
        shell: bash
        working-directory: ${{ env.repo_dir }}
        run: |
          gh release create \
          ${{ inputs.pre-release && '--prerelease' || '' }} \
          --notes-file $PATH_TO_NOTES \
          --verify-tag \
          --fail-on-no-commits \
          v$RELEASE_VERSION \
          $PATH_TO_RELEASE_ASSETS/*

  publish-updater-metadata-to-website:
    needs: create-release
    uses: ./.github/workflows/publish-updater-to-website.yml
    with:
      tag-name: v${{ inputs.new-version }}
      pre-release: ${{ inputs.pre-release }}
    secrets:
      website-app-client-id: ${{ secrets.WEBSITE_APP_CLIENT_ID }}
      website-app-private-key: ${{ secrets.WEBSITE_APP_PRIVATE_KEY }}

  cleanup:
    needs: [update-changelog, build, create-release, publish-updater-metadata-to-website]
    if: ${{ !failure() && !cancelled() }}

    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ env.releasing_branch }}
          fetch-depth: 2

      - name: Setup Git User
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com

      - name: Delete Releasing Branch
        env:
          BRANCH_TO_DELETE: ${{ env.releasing_branch }}
        shell: bash
        run: git push --delete origin $BRANCH_TO_DELETE
